<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Load Balancer Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Load Balancer Simulator</h1>

  <section class="controls">
    <label>
      Servers:
      <input type="number" id="serverCount" value="2" min="1" max="10">
      <button id="applyServersBtn">Apply</button>
    </label>
    <label>
      Requests to fire:
      <input type="number" id="requestCount" value="10" min="1" max="100">
    </label>
    <label>
      Algorithm:
      <select id="algorithmSelect">
        <option value="round-robin">Round Robin</option>
        <option value="least-connections">Least Connections</option>
        <option value="random">Random</option>
      </select>
    </label>
    <button id="fireBtn">Fire Requests</button>
    <button id="resetBtn" class="secondary">Reset</button>
  </section>

  <section class="stats" id="statsGrid"></section>

  <section class="bar-section">
    <div class="bar-wrap" id="barWrap"></div>
    <div class="bar-labels" id="barLabels"></div>
  </section>

  <section class="log">
    <h2>Request Log <span class="total-label" id="totalLabel"></span></h2>
    <table>
      <thead>
        <tr>
          <th>Request ID</th>
          <th>Backend</th>
          <th>Algorithm</th>
          <th>Backend ms</th>
          <th>Total ms</th>
          <th>Time</th>
        </tr>
      </thead>
      <tbody id="logBody"></tbody>
    </table>
  </section>

  <div id="status-bar">
    <span id="connection-status" class="disconnected">● Connecting...</span>
  </div>

  <script src="app.js"></script>
</body>
</html>
